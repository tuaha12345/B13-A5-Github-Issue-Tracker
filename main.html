<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!--------- daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-------- font geist------->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!---------- css----->
    <link rel="stylesheet" href="./style/style.css">

</head>
<body class="min-h-screen">
   <header class=" bg-white border-b border-gray-200">
     <div class="w-11/12 mx-auto flex justify-between py-5">
            <div class="left flex gap-2">
                <div class="w-9 h-9">
                    <img src="assets/github-logo.png">
                </div>
                <h3 class="font-semibold text-[24px]">GitHub Issues Tracker</h3>
            </div>
            <div class="right">
               <form class="flex gap-2">
               <label class="input input-bordered flex items-center gap-2 ">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>
                <button type="submit" class="btn btn-primary">+ New Issue</button>
               </form>

            </div>
    </div>
   </header>

   <section class="main my-[60px]">
      <div class="toggler max-w-[1100px] mx-auto bg-white rounded-xl p-6 shadow-xl">
        <button class="btn btn-primary w-[120px]">All</button>
        <button class="btn btn-outline btn-primary w-[120px]">Open</button>
        <button class="btn btn-outline btn-primary w-[120px]">Close</button>
      </div>

      <div class="main-header max-w-[1100px] mx-auto bg-white rounded-t-xl p-6 shadow-xl mt-4">
         <div class="left">
            <div>
                <img src="assets/Aperture.png">
            </div>
         </div>
         <div class="right"></div>
      </div>
   </section>
</body>
</html>
