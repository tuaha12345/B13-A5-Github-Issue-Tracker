<body class="min-h-screen ">
   <header class=" bg-white border-b border-gray-200">
     <div class="w-11/12 mx-auto flex flex-col md:flex-row justify-between py-5 gap-3 md:gap-0">
            <div class="left flex gap-2">
                <div class="w-9 h-9">
                    <img src="assets/github-logo.png">
                </div>
                <h3 class="font-semibold text-[24px]">GitHub Issues Tracker</h3>
            </div>
            <div class="right">
               <div class="flex gap-2">
               <label class="input input-bordered flex items-center gap-2 ">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" class="grow" placeholder="Search issues..." id="searchInput" />
                </label>
                <button type="submit" class="btn btn-primary " onClick="search()">+ New Issue</button>
               </div>

            </div>
    </div>
   </header>

   <section class="main py-[60px]">
      <div class="toggler max-w-[1300px] mx-auto bg-white rounded-xl p-6 shadow-xl">
        <button class="btn btn-primary w-[60px] md:w-[120px]" id="all" onclick="toggleButton('all')">All</button>
        <button class="btn btn-outline w-[60px] md:w-[120px]" id="open" onclick="toggleButton('open')">Open</button>
        <button class="btn btn-outline w-[60px] md:w-[120px]" id="closed" onclick="toggleButton('closed')">Close</button>

      </div>
     <div class=" max-w-[1300px] mx-auto flex p-6 justify-center hidden" id="loadingDiv">
        <span class="loading loading-bars loading-xl text-primary text-center"></span>
     </div>
      <div class="main-header max-w-[1300px] mx-auto bg-white rounded-t-xl p-6 shadow-xl mt-4 flex items-center justify-between">
         <div class="left flex gap-4">
            <div class=" flex items-center justify-center bg-[#EBE2FE] rounded-full w-13 h-13 ">
                <img src="assets/Aperture.png">
            </div>
            <div class="">
                <h3 class="font-semibold text-[20px]" id="total_issue"><span id="issueNumber">0</span> Issues</h3>
                <p>Track and manage your project issues</p>
            </div>
         </div>
         <div class="right flex gap-3">
            <div class="flex items-center gap-2 ">
                <span class="inline-block w-3 h-3 rounded-full bg-[#1ad80c] "></span>
                <h4 class="font-medium text-[16px]">Open</h4>
            </div>
            <div class="flex items-center gap-2 ">
                <span class="inline-block w-3 h-3 rounded-full bg-[#d00dea] "></span>
                <h4 class="font-medium text-[16px]">Closed</h4>
            </div>
         </div>
      </div>
      
       <div class="main-header max-w-[1300px] mx-auto bg-[#FBFBFB] border-t border-t-gray-200 p-6 shadow-xl rounded-b-xl  flex items-center justify-between">
          <div class="container py-6 grid grid-cols-1  md:grid-cols-3 gap-4" id="cardContainer">

          </div>

      </div>
    </section>

    <div>
        <!-- Open the modal using ID.showModal() method -->
            <dialog id="my_modal_1" class="modal">
            <div class="modal-box">
                <div class="modal_body" id="modal_body">

                </div>
                <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
                </div>
            </div>
            </dialog>
    </div>
